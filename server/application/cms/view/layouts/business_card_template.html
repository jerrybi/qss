            <div id="bc-revert">

        <div class="bc-tool">
            <button class="layui-btn" type="button" onclick="BC_AddText()">Add Text</button>

                <input type="number" id="bg_size_h" name="bg_size_h" oninput="BC_onBCBgSizeHInput()"

                <input type="text" name="bc_size" oninput="BC_onBCSizeInput()"

                       placeholder="Please input size" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item flex-row" id="bc_color" style="display: none">
            <label class="layui-form-label">Color:</label>
            <div class="layui-input-inline">
                <div id="bc_color_picker"></div>
                <input type="hidden" name="bc_color" value=""/>

            </div>
        </div>
        <div class="layui-form-item" id="bc_align" style="display: none">
            <label class="layui-form-label">Align:</label>
            <div class="layui-input-inline align-container">
                <div class="align-row">
                    <div class="align-col tl active" onclick="clickAlign('tl')"></div>
                    <div class="align-col tc" onclick="clickAlign('tc')"></div>
                    <div class="align-col tr" onclick="clickAlign('tr')"></div>

                <div class="align-row">
                    <div class="align-col ml" onclick="clickAlign('ml')"></div>

<script>
    var canvas;
    var cardSide = 0;
    var content1,content2;
    var pixtelPerCm = 28.346;
    var webSafeFonts = ['Helvetica','Arial','Arial Black','Verdana','Tahoma','Trebuchet MS','Impact','Gill Sans',
        'Times New Roman','Georgia','Palatino','Baskerville','Courier','Lucida','Monaco',
        'Bradley Hand','Brush Script MT','Luminari','Comic Sans MS'];
    var customFonts = ['Abril Fatface','Alfa Slab One','Bebas Neue','Caveat','Comfortaa','Dancing Script',
        'IBM Plex Mono','Inconsolata','Indie Flower','Lato','Lobster','Lora','Merriweather','Montserrat',
        'Open Sans','Pacifico','Playfair Display','Poppins','PT Serif','Roboto','Roboto Mono','Roboto Slab',
        'Shadows Into Light','Source Code Pro','Space Mono'];
    function BC_init(config) {
        initClueTextBox();
        $("input[name='double_side'][value="+config.double_side+"]").attr("checked",true);
        if(config.double_side == '0'){
            $('#bc-revert').hide();
        }
        $("input[name='bg_size_type'][value="+config.bg_size_type+"]").attr("checked",true);
        var bgWidth = 0,bgHeight = 0;
        if(config.bg_size_type == '0'){
            $('#bg_size_dropdown').show();
            $('#bg_size_input').hide();
            $("#bg_size_dropdown select").val(config.bg_size_index);
            var size = getBgSize(config.bg_size_index);
            bgWidth = size[0];
            bgHeight = size[1];
        }else{
            $('#bg_size_dropdown').hide();
            $('#bg_size_input').show();
            $("#bg_size_w").val(config.bg_width);
            $("#bg_size_h").val(config.bg_height);
            bgWidth = config.bg_width;
            bgHeight = config.bg_height;
        }
        canvas = new fabric.Canvas('bc');
        setCanvasWidth(bgWidth*pixtelPerCm);
        setCanvasHeight(bgHeight*pixtelPerCm);
        console.log(config.content1);
        content1 = config.content1;
        content2 = config.content2;
        if(cardSide == 0){
            if(config.content1 && config.content1.length > 0){
                canvas.loadFromJSON(config.content1);
                renderCustomFont();
            }
        }else{
            if(config.content2 && config.content2.length > 0){
                canvas.loadFromJSON(config.content2);
                renderCustomFont();
            }
        }
        layui.form.render();
        canvas.on('mouse:down',function (options) {
            console.log(options);
            hideAllProperty();
            if(options.target){
                console.log(options.target.customType);
                let customType = options.target.customType;
                if(customType === 'text'){
                    $('#bc_name').show();
                    $('#bc_size').show();
                    $('#bc_color').show();
                    $('#bc_align').show();
                    $('#bc_font_type').show();
                    $('input[name="bc_name"]').val(options.target.text);
                    $('input[name="bc_size"]').val(options.target.fontSize);
                    $('input[name="bc_color"]').val(options.target.fill);
                    $('#bc_font_type_select').val(options.target.fontFamily);
                    $(".align-col").removeClass('active');
                    $(".align-col."+options.target.customAlign).addClass('active');
                    initColorPicker();
                    layui.form.render();
                }else if(customType === 'image'){
                    $('#bc_image').show();
                    $('input[name="bc_image"]').val(options.target.customText);
                }else if(customType === 'qrcode'){
                    $('#bc_qr').show();
                    $('input[name="bc_qr"]').val(options.target.customText);
                }
            }else{
                $('#double_side').show();
                $('#bg_size').show();
                initBgColorData();
            }
        });
    }
    function initClueTextBox(){
        fabric.ClueTextBox = fabric.util.createClass(fabric.Textbox, {
            type: 'ClueTextBox',
            /**
             * Properties which when set cause object to change dimensions
             * @type Object
             * @private
             */
            _dimensionAffectingProps: fabric.IText.prototype._dimensionAffectingProps.slice(0),
            cacheProperties: fabric.Textbox.prototype.cacheProperties.concat('customAlign'),

            _renderTextCommon: function(ctx, method) {
                console.log("_renderTextCommon");
                console.log(this);
                ctx.save();
                var lineHeights = 0, left = this._getLeftOffset(), top = this._getTopOffset(),
                    offsets = this._applyPatternGradientTransform(ctx, method === 'fillText' ? this.fill : 	this.stroke);
                console.log("left:"+left+" top:"+top);
                console.log(offsets);
                var totalHeight = 0;
                for (var i = 0, len = this._textLines.length; i < len; i++) {
                    totalHeight += this.getHeightOfLine(i) / this.lineHeight;
                }
                if(this.customAlign === 'ml' || this.customAlign === 'mc' || this.customAlign === 'mr'){
                    top += this.height >= totalHeight ? (this.height-totalHeight)/2 : 0;
                }else if(this.customAlign === 'bl' || this.customAlign === 'bc' || this.customAlign === 'br'){
                    top += this.height >= totalHeight ? (this.height-totalHeight) : 0;
                }
                for (var i = 0, len = this._textLines.length; i < len; i++) {
                    var heightOfLine = this.getHeightOfLine(i),
                        maxHeight = heightOfLine / this.lineHeight,
                        leftOffset = this._getLineLeftOffset(i);
                    if(lineHeights+heightOfLine < this.getScaledHeight()){
                        this._renderTextLine(
                            method,
                            ctx,
                            this._textLines[i],
                            left + leftOffset - offsets.offsetX,
                            top + lineHeights + maxHeight - offsets.offsetY,
                            i
                        );
                    }
                    lineHeights += heightOfLine;
                }
                // console.log("width:"+this.width+" height:"+this.height+" scaleHeight:"+this.getScaledHeight());
                ctx.restore();
            },
            initDimensions() {
                console.log("initDimensions");
                if (this.__skipDimension) {
                    return;
                }
                this.isEditing && this.initDelayedCursor();
                this.clearContextTop();
                this._clearCache();
                // clear dynamicMinWidth as it will be different after we re-wrap line
                this.dynamicMinWidth = 0;
                // wrap lines
                this._styleMap = this._generateStyleMap(this._splitText());
                // if after wrapping, the width is smaller than dynamicMinWidth, change the width and re-wrap
                if (this.dynamicMinWidth > this.width) {
                    this._set('width', this.dynamicMinWidth);
                }
                if (this.textAlign.indexOf('justify') !== -1) {
                    // once text is measured we need to make space fatter to make justified text.
                    this.enlargeSpaces();
                }
                // clear cache and re-calculate height
                if(this.height <= 0){
                    this.height = this.calcTextHeight();
                }
                this.saveState({ propertySet: '_dimensionAffectingProps' });
            }
        });
        fabric.ClueTextBox.fromObject = function(object, callback) {
            var styles = fabric.util.stylesFromArray(object.styles, object.text);
            //copy object to prevent mutation
            var objCopy = Object.assign({}, object, { styles: styles });
            return fabric.Object._fromObject('ClueTextBox', objCopy, callback, 'text');
        };
    }
    function BC_getContent() {
        var doubleSide = $("input[type='radio'][name='double_side']:checked").val();
        if(cardSide == 0){
            content1 = JSON.stringify(canvas.toJSON(["customType","customText","customAlign"]));
        }else{
            content2 = JSON.stringify(canvas.toJSON(["customType","customText","customAlign"]));
        }
        var bgSizeType = $("input[name='bg_size_type']:checked").val();
        var bgSizeIndex = 0;
        var bgSizeW = 0;
        var bgSizeH = 0;
        if(bgSizeType == '0'){
            bgSizeIndex = $("#bg_size_dropdown select").val();
            var size = getBgSize(bgSizeIndex);
            bgSizeW = size[0];
            bgSizeH = size[1];
        }else{
            bgSizeW = $("#bg_size_w").val();
            bgSizeH = $("#bg_size_h").val();
        }
        return {
            bg_size_type:bgSizeType,
            bg_size_index:bgSizeIndex,
            bg_width:bgSizeW,
            bg_height:bgSizeH,
            double_side:doubleSide,
            content1:content1,
            content2:doubleSide=='1' ? content2 : ''
        };
    }
    layui.use(['form','colorpicker'],function(){
        var form = layui.form;
        var colorpicker = layui.colorpicker;
        form.on('radio(bg_size_type)',function(data){
            if(data.value == '0'){
                $("#bg_size_dropdown").show();
                $("#bg_size_input").hide();
                var size = getBgSize($("#bg_size_dropdown select").val());
                setCanvasWidth(size[0]*pixtelPerCm);
                setCanvasHeight(size[1]*pixtelPerCm);
            }else{
                $("#bg_size_dropdown").hide();
                $("#bg_size_input").show();
                var bgSizeW = $("#bg_size_w").val();
                var bgSizeH = $("#bg_size_h").val();
                if(bgSizeW > 0 && bgSizeH > 0){
                    setCanvasWidth(bgSizeW*pixtelPerCm);
                    setCanvasHeight(bgSizeH*pixtelPerCm);
                }
            }
        });
        form.on('select(bg_size_dropdown)', function(data){
            var size = getBgSize(data.value);
            setCanvasWidth(size[0]*pixtelPerCm);
            setCanvasHeight(size[1]*pixtelPerCm);
        });
        form.on('radio(double_side)',function(data){
            if(data.value == '0'){
                if(cardSide == 1){
                    cardSide = 0;
                    if(content1){
                        canvas.loadFromJSON(content1);
                        renderCustomFont();
                        initBgColorData();
                    }else{
                        canvas.clear();
                    }
                    $('#bc-title').text('Front');
                }
                $('#bc-revert').hide();
            }else{
                $('#bc-revert').show();
            }
        });
        initBgColorData();
        initFontTypeOptions();
    });
    function initBgColorData() {
        if(cardSide == 0){
            $('input[name="bg_color"]').val(canvas.backgroundColor);
            $('#bg_color').show();
            $('#back_bg_color').hide();
        }else{
            $('input[name="back_bg_color"]').val(canvas.backgroundColor);
            $('#bg_color').hide();
            $('#back_bg_color').show();
        }
        initBgColorPicker();
    }
    function initColorPicker() {
        layui.colorpicker.render({
            elem: '#bc_color_picker',
            color: $("input[name='bc_color']").val(),
            change: function (color) {
                $("input[name='bc_color']").val(color);
                BC_onBCColorInput();
            }
        });
    }
    function initBgColorPicker() {
        if(cardSide == 0){
            layui.colorpicker.render({
                elem: '#bg_color_picker',
                color: $("input[name='bg_color']").val(),
                change: function (color) {
                    $("input[name='bg_color']").val(color);
                    BC_onBgColorInput();
                }
            });
        }else{
            layui.colorpicker.render({
                elem: '#back_bg_color_picker',
                color: $("input[name='back_bg_color']").val(),
                change: function (color) {
                    $("input[name='back_bg_color']").val(color);
                    BC_onBgColorInput();
                }
            });
        }
        layui.form.render();
    }
    function initFontTypeOptions() {
        var select = document.getElementById("bc_font_type_select");
        var fonts = webSafeFonts.concat(customFonts);
        fonts.forEach(function (font) {
            var option = document.createElement('option');
            option.innerHTML = font;
            option.value = font;
            select.appendChild(option);
        });
        layui.form.on('select(bc_font_type)', function(data){
            if(webSafeFonts.indexOf(data.value) >= 0){
                canvas.getActiveObject().set('fontFamily',data.value);
                canvas.requestRenderAll();
            }else{
                loadAndUse(data.value);
            }
        });
        layui.form.render();
    }
    function loadAndUse(font) {
        var myfont = new FontFaceObserver(font);
        myfont.load().then(function () {
            canvas.getActiveObject().set('fontFamily',font);
            canvas.requestRenderAll();
        }).catch(function (e) {
            console.log(e);
            alert('font loading failed ' + font);
        });
    }
    function loadFont(font) {
        var myfont = new FontFaceObserver(font);
        myfont.load().then(function () {
            canvas.requestRenderAll();
        }).catch(function (e) {
            console.log(e);
        });
    }
    function renderCustomFont() {
        var objects = canvas.getObjects();
        for(var i = 0; i < objects.length; i++){
            if(objects[i].fontFamily && objects[i].fontFamily.length > 0){
                if(webSafeFonts.indexOf(objects[i].fontFamily) < 0){
                    objects[i].dirty = true;
                    loadFont(objects[i].fontFamily);
                }
            }
        }
    }
    function getBgSize(index) {
        if(index == 0){
            return [8.55,5.56];
        }else if(index == 1){
            return [10.2,7.5];
        }else if(index == 2){
            return [10.0,10.0];
        }else if(index == 3){
            return [9.1,13.5];
        }else if(index == 4){
            return [10.0,15.0];
        }else{
            return [0,0];
        }
    }
    function setCanvasWidth(width) {
        canvas.setWidth(width);
    }
    function setCanvasHeight(height) {
        canvas.setHeight(height);
        var attrHeight = $('.bc-property').outerHeight();
        if(attrHeight < 500){
            attrHeight = 500;
        }
        var toolHeight = $('.bc-tool').outerHeight();
        var titleHeight = $('#bc-title').outerHeight();
        var revertHeight = $('#bc-revert').outerHeight();
        if((height+toolHeight+titleHeight+revertHeight) > attrHeight){
            $('.bc-workplace').height(height+titleHeight+revertHeight);
            $('.bc-property').height(height+toolHeight+titleHeight+revertHeight);
        }else{
            $('.bc-workplace').height(attrHeight-toolHeight);
            $('.bc-property').height(attrHeight);
        }
    }
    function hideAllProperty() {
        $('#double_side').hide();
        $('#bg_size').hide();
        $('#bg_color').hide();
        $('#back_bg_color').hide();
        $('#bc_font_type').hide();
        $('#bc_name').hide();
        $('#bc_size').hide();
        $('#bc_color').hide();
        $('#bc_align').hide();
        $('#bc_image').hide();
        $('#bc_qr').hide();
    }
    function BC_AddText() {
        var time = (new Date()).getTime();
        // var text = new fabric.IText('[Enter Text]', {left: 100, top: 100, fontSize: 30, fill: '#000000', customType: 'text'});
        var text = new fabric.ClueTextBox("[%Field Name%]");
        text.set({
            fontSize: 16,
            lineHeight: 1,
            charSpacing: 10,
            editable: false,
            dirty:false,
            objectCaching:false,
            lockUniScaling: false,
            lockScalingFlip: true,
            splitByGrapheme:true,
            left: 0,
            top: 0,
            fill: '#000000',
            customType: 'text',
            customAlign: 'tl'
        });
        text.setControlsVisibility({
            mt: true, // middle top disable
            mb: true, // midle bottom
            ml: true, // middle left
            mr: true, // middle right
        });
        text.on('scaling', () =>{
            updateTextBoxSize(text);
        });
        text.on('resizing', () => {
            updateTextBoxSize(text)
        });
        text.toObject(['customType','customAlign']);
        canvas.add(text);
    }
    function updateTextBoxSize(text) {
        var newHeight = text.height * text.scaleY;
        console.log("height:"+text.height+" scaleY:"+text.scaleY+" newHeight:"+newHeight);
        console.log("width:"+text.width+" scaleX:"+text.scaleX+" newWidth:"+(text.width * text.scaleX));
        text.set({
            width: text.width * text.scaleX,
            scaleX: 1,
        });
        text.initDimensions();
        text.set({ height: newHeight, scaleY: 1 })
    }
    function adjustTextFont(obj) {
        console.log("adjustTextFont");
        var totalHeight = 0;
        do{
            totalHeight = 0;
            for (var i = 0, len = obj._textLines.length; i < len; i++) {
                totalHeight += obj.getHeightOfLine(i) / obj.lineHeight;
            }
            console.log("totalHeight:"+totalHeight+" height:"+obj.height);
            if(totalHeight > obj.height){
                obj.fontSize--;
                obj.initDimensions();
                if(obj.fontSize <= 10){
                    break;
                }
            }
        }while(totalHeight>obj.height);
        console.log("fontsize:"+obj.fontSize);
        $('input[name="bc_size"]').val(obj.fontSize);
    }
    function clickAlign(align) {
        $(".align-col").removeClass('active');
        $(".align-col."+align).addClass('active');
        var activeObj = canvas.getActiveObject();
        if(activeObj){
            // activeObj.customAlign = align;
            activeObj.set('customAlign',align);
            if(align === 'tl' || align === 'ml' || align === 'bl'){
                activeObj.set('textAlign','left');
            }else if(align === 'tc' || align === 'mc' || align === 'bc'){
                activeObj.set('textAlign','center');
            }else if(align === 'tr' || align === 'mr' || align === 'br'){
                activeObj.set('textAlign','right');
            }
        }
        canvas.renderAll();
    }

        fabric.Image.fromURL('/static/images/avatar.png', function (oImg) {
            oImg.set({left: 0, top: 0, customType: 'image', customText: '[%Avatar%]'});
            oImg.scaleToWidth(100);
            oImg.scaleToHeight(100);
            oImg.toObject(['customType','customText']);
            canvas.add(oImg);
        });

    function BC_AddQR() {
        fabric.Image.fromURL('/static/images/qr.jpg', function (oImg) {
            oImg.set({left: 0, top: 0, customType: 'qrcode', customText: '[%Serial Number%] - [%First Name%] [%Last Name%]'});
            oImg.scaleToWidth(100);
            oImg.scaleToHeight(100);
            oImg.toObject(['customType','customText']);
            canvas.add(oImg);

    function BC_AddVCard() {

            oImg.set({left: 0, top: 0, customType: 'vcard'});
            oImg.scaleToWidth(100);

    function BC_DeleteItem() {
        var activeObj = canvas.getActiveObject();
        if(activeObj){
            canvas.remove(activeObj);
        }
        canvas.renderAll();
    }
    function BC_onBgColorInput() {
        var color;
        if(cardSide == 0){
            color = $('input[name="bg_color"]').val();
        }else{
            color = $('input[name="back_bg_color"]').val();
        }
        if(color.substr(0,1) !== '#'){
            color = '#' + color;
        }
        console.log(color);
        canvas.backgroundColor = color;
        canvas.renderAll();
    }
    function BC_onBCNameInput() {
        var name = $('input[name="bc_name"]').val();
        var activeObj = canvas.getActiveObject();
        if(activeObj){
            activeObj.text = name;
            // 计算文字有没有超出设定的宽高，如果超过了，需要把字体改小
            adjustTextFont(activeObj);
        }
        canvas.renderAll();
    }
    function BC_onBCSizeInput() {
        var size = $('input[name="bc_size"]').val();
        var activeObj = canvas.getActiveObject();
        if(activeObj){
            activeObj.fontSize = size;
            setTimeout(()=>{
                adjustTextFont(activeObj);
                canvas.renderAll();
            },100);
        }
        canvas.renderAll();
    }
    function BC_onBCColorInput() {
        var color = $('input[name="bc_color"]').val();
        if(color.substr(0,1) !== '#'){
            color = '#' + color;
        }
        console.log(color);
        var activeObj = canvas.getActiveObject();
        if(activeObj){
            console.log(activeObj.isEditing);
            if(activeObj.isEditing){
                activeObj.setSelectionStyles({'fill': color});
            }else{
                console.log(activeObj);
                activeObj.set('fill',color);
                let s = activeObj.styles;
                for (let i in s) {
                    for (let j in s[i]) {
                        s[i][j].fill = color;
                    }
                }
            }
        }
        canvas.renderAll();
    }
    function BC_onBCImageInput() {
        var name = $('input[name="bc_image"]').val();
        var activeObj = canvas.getActiveObject();
        if(activeObj){
            activeObj.customText = name;
        }
        canvas.renderAll();
    }
    function BC_onBCQRInput() {
        var name = $('input[name="bc_qr"]').val();
        var activeObj = canvas.getActiveObject();
        if(activeObj){
            activeObj.customText = name;
        }
        canvas.renderAll();
    }
    function BC_onBCBgSizeWInput(){
        var width = $("#bg_size_w").val();
        setCanvasWidth(width*pixtelPerCm);
    }
    function BC_onBCBgSizeHInput(){
        var height = $("#bg_size_h").val();
        setCanvasHeight(height*pixtelPerCm);
    }
    function revert() {
        if(cardSide == 0){
            cardSide = 1;
            $("#bc-title").text("Back");
            content1 = JSON.stringify(canvas.toJSON(["customType","customText","customAlign"]));
            console.log(content2);
            if(content2){
                canvas.loadFromJSON(content2);
                renderCustomFont();
            }else{
                canvas.clear();
            }
        }else{
            cardSide = 0;
            $("#bc-title").text("Front");
            content2 = JSON.stringify(canvas.toJSON(["customType","customText","customAlign"]));
            console.log(content1);
            if(content1){
                canvas.loadFromJSON(content1);
                renderCustomFont();
            }else{
                canvas.clear();
            }
        }
        initBgColorData();
        canvas.renderAll();
    }
