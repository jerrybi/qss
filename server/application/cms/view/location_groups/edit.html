{extend name='layouts/cms'}
{block name='body-content'}
<form class="layui-form form-op-normal layui-form-pane">
    <div class="layui-form-item">
        <label class="layui-form-label">Event：</label>
        <div class="layui-input-inline">
            <select name="event_id" id="event" lay-verify="required" lay-filter="event">
                <option value="">Please select event</option>
            </select>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">Name：</label>
        <div class="layui-input-inline">
            <input type="text" name="name" required lay-verify="required"
                   value="{$article['name']}"
                   placeholder="Please input the name" autocomplete="off" class="layui-input input-title-mz">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label">Capacity：</label>
        <div class="layui-input-inline">
            <input type="text" name="capacity" required lay-verify="required"
                   value="{$article['capacity']}"
                   placeholder="Please input the capacity" autocomplete="off" class="layui-input input-title-mz">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label">Sort：</label>
        <div class="layui-input-inline">
            <input type="number" name="list_order"
                   value="{$article['list_order']}" required lay-verify="required"
                   autocomplete="off" class="layui-input">
        </div>
        <div class="layui-form-mid layui-word-aux">(the smaller the number,the higher the order )</div>
    </div>
    {:token()}
    <div class="layui-form-item">
        <div class="layui-input-block div-form-op">
            <button class="layui-btn" type="button"
                    op_url="{:url('cms/locationGroups/edit',['id'=>$article.id])}"
                    onclick="opFormPostRecord(this,fail_callback)">Submit</button>
            <button type="reset" class="layui-btn layui-btn-primary">Discard</button>
        </div>
    </div>
</form>
<script>
    layui.use('form',function(){
        var form = layui.form;
        form.on('select(event)',function(data){
            var event_id = data.value;
        });
        onReady();
    });
    function onReady(){
        var events = <?php echo json_encode($events);?>;
        var event_id = "{$article['event_id']}";
        var eventStr = "";
        $.each(events,function(i,item){
                eventStr += "<option value='"+item['id']+"'>"+item['name']+"</option>";
        });
        $("#event").html(eventStr );
        $("#event").val(event_id);
        layui.form.render();
    }

    function fail_callback(){
        window.location.reload();
    }
</script>
{/block}

{block name='single-content'}
{/block}
