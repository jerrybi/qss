    <div hidden="hidden" id="events"><?php echo json_encode($events);?></div>
    <input type="hidden" id="admin_account" name="admin_account" value="">
    {:token()}
    <div class="layui-form-item">
        <div class="layui-input-block div-form-op">
            <button class="layui-btn" type="button"
                    op_url="{:url('cms/vendors/add')}" lay-submit lay-filter="vendor">Submit</button>
            <button type="reset" class="layui-btn layui-btn-primary">Discard</button>
        </div>
    </div>
</form>
<script>
    layui.use('form',function(){
        var form = layui.form;
        form.verify({
            loginname:[
                /^[a-z0-9.@]{8,256}$/,
                'invalid login name!'
            ]
        });
        form.on('select(event)',function(data){
            var event_id = data.value;
            getBoothAttrs(event_id);
        });
        form.on('submit(vendor)',function(data){
            opFormPostRecord(data.form,fail_callback);
        });
        initData();
    });
      function initData(){
        var events = JSON.parse($('#events').text());
        var eventStr = "";
        $.each(events,function(i,item){
            eventStr += "<option value='"+item['id']+"'>"+item['name']+"</option>";
        });
        $("#event").html(eventStr );
        getBoothAttrs(events[0].id);
        updateAdminAccounts();
    };
    function fail_callback(){
        window.location.reload();
    }
    function getBooth(booth_name){
        $.post(
            "{:url('cms/booths/getBooth')}",
            {
                event_id:$('#event').val(),
                booth_name:booth_name
            },
            function (result) {
                if(result.status == 200){
                    reloadBooth(result.data);
                }else{
                    //失败
                    dialog.tip(result.message);
                }
            },"JSON");
    }
    function reloadBooth(data) {
        if(!data) return;
        $('.input-location').val(data.location);
        $('.input-badge').val(data.badge);
    }
    function getBoothAttrs(event_id){
        $.post(
            "{:url('cms/vendors/getVendorAttrs')}",
            {event_id:event_id},
            function (result) {
                if(result.status == 200){
                    reloadBoothAttrs(result.data);
                }else{
                    //失败
                    dialog.tip(result.message);
                }
            },"JSON");
    }
    function getAttrByKey(attrs,key){
        for(var i=0;i<attrs.length;i++){
            var item = attrs[i];
            if(item.key == key){
                return item;
            }
        }
        return null;
    }
    function reloadBoothAttrs(data){
        if(!data) return;
        var titles = data.titles;
        var boothAttrs = data.vendorAttrs;
        if(titles['name']){
            $('.lbl-name').text(titles['name']);
        }
        var nameAttr = getAttrByKey(boothAttrs,'name');
        if(nameAttr){
            $('.input-name').val(nameAttr.default);
        }
        //admin
        if(titles['admin_account']){
            $('.lbl-admin').text(titles['admin_account']);
        }
        //origin_country
        if(titles['origin_country']){
            $('.lbl-origin-country').text(titles['origin_country']);
        }
        var originCountryAttr = getAttrByKey(boothAttrs,'origin_country');
        if(originCountryAttr){
            var originCountryStr = "";
            var options = originCountryAttr.options.split('\r\n');
            $.each(options,function(i,item){
                originCountryStr += "<option value='"+item+"'>"+item+"</option>";
            });
            $("#origin_country").html(originCountryStr);
            $("#origin_country").val(originCountryAttr.default);
            layui.form.render('select');
        }
        //profile
        if(titles['profile']){
            $('.lbl-profile').text(titles['profile']);
        }
        var profileAttr = getAttrByKey(boothAttrs,'profile');
        if(profileAttr){
            $('.input-profile').val(profileAttr.default);
        }
        //logo
        if(titles['logo']){
            $('.lbl-logo').text(titles['logo']);
        }
        //email
        if(titles['email']){
            $('.lbl-email').text(titles['email']);
        }
        var emailAttr = getAttrByKey(boothAttrs,'email');
        if(emailAttr){
            $('.input-email').val(emailAttr.default);
        }
        //address line 1
        if(titles['address_line1']){
            $('.lbl-address-line1').text(titles['address_line1']);
        }
        var addressLine1Attr = getAttrByKey(boothAttrs,'address_line1');
        if(addressLine1Attr){
            $('.input-address-line1').val(addressLine1Attr.default);
        }
        //address line 2
        if(titles['address_line2']){
            $('.lbl-address-line2').text(titles['address_line2']);
        }
        var addressLine2Attr = getAttrByKey(boothAttrs,'address_line2');
        if(addressLine2Attr){
            $('.input-address-line2').val(addressLine2Attr.default);
        }
        //postal
        if(titles['postal']){
            $('.lbl-postal').text(titles['postal']);
        }
        var postalAttr = getAttrByKey(boothAttrs,'postal');
        if(postalAttr){
            $('.input-postal').val(postalAttr.default);
        }
        //country
        if(titles['country']){
            $('.lbl-country').text(titles['country']);
        }
        var countryAttr = getAttrByKey(boothAttrs,'country');
        if(countryAttr){
            var countryStr = "";
            var options = countryAttr.options.split('\r\n');
            $.each(options,function(i,item){
                countryStr += "<option value='"+item+"'>"+item+"</option>";
            });
            $("#country").html(countryStr);
            $("#country").val(countryAttr.default);
            layui.form.render('select');
        }
        //phone
        if(titles['phone']){
            $('.lbl-phone').text(titles['phone']);
        }
        //fax
        if(titles['fax']){
            $('.lbl-fax').text(titles['fax']);
        }
        //website
        if(titles['website']){
            $('.lbl-website').text(titles['website']);
        }
        var websiteAttr = getAttrByKey(boothAttrs,'website');
        if(websiteAttr){
            $('.input-website').val(websiteAttr.default);
        }
    }
    function updateAdminAccounts() {
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        var html = '';
        $.each(items,function (i,item) {
            html += '<div class="section-item">';
            html += '<div class="section-block">';
            html += '<div class="section-input-item">';
            html += '<input type="text" placeholder="Login Name" class="layui-input" name="login_name'+i+'" value="'+item.login_name+'" oninput="onLoginNameItemInput(this,'+i+')" onpropertychange="onLoginNameItemInput(this,'+i+')" lay-verify="loginname">';
            html += '<label class="section-input-hint">(consist of a-z0-9@. and length is in 8-256)</label>';
            html += '</div>';
            html += '<div class="section-input-item">';
            html += '<input type="text" placeholder="First Name" class="layui-input" name="first_name'+i+'" value="'+item.first_name+'" oninput="onFirstNameItemInput(this,'+i+')" onpropertychange="onFirstNameItemInput(this,'+i+')" lay-verify="required">';
            html += '<label class="section-input-hint">(first name)</label>';
            html += '</div>';
            html += '<div class="section-input-item">';
            html += '<input type="text" placeholder="Last Name" class="layui-input" name="last_name'+i+'" value="'+item.last_name+'" oninput="onLastNameItemInput(this,'+i+')" onpropertychange="onLastNameItemInput(this,'+i+')" lay-verify="required">';
            html += '<label class="section-input-hint">(last name)</label>';
            html += '</div>';
            html += '<div class="section-input-item">';
            html += '<input type="number" placeholder="Country code" class="layui-input" name="phone_country_code'+i+'" value="'+item.phone_country_code+'" oninput="onCountryCodeItemInput(this,'+i+')" onpropertychange="onCountryCodeItemInput(this,'+i+')" lay-verify="required">';
            html += '<label class="section-input-hint">(country code)</label>';
            html += '</div>';
            html += '<div class="section-input-item">';
            html += '<input type="number" placeholder="Area code" class="layui-input" name="phone_area_code'+i+'" value="'+item.phone_area_code+'" oninput="onAreaCodeItemInput(this,'+i+')" onpropertychange="onAreaCodeItemInput(this,'+i+')">';
            html += '<label class="section-input-hint">(area code)</label>';
            html += '</div>';
            html += '<div class="section-input-item">';
            html += '<input type="number" placeholder="Phone Number" class="layui-input" name="phone_number'+i+'" value="'+item.phone_number+'" oninput="onPhoneNumberItemInput(this,'+i+')" onpropertychange="onPhoneNumberItemInput(this,'+i+')" lay-verify="required">';
            html += '<label class="section-input-hint">(phone number)</label>';
            html += '</div>';
            html += '<div class="section-input-item">';
            html += '<input type="text" placeholder="Email" class="layui-input" name="email'+i+'" value="'+item.email+'" oninput="onEmailItemInput(this,'+i+')" onpropertychange="onEmailItemInput(this,'+i+')" lay-verify="required|email">';
            html += '<label class="section-input-hint">(email)</label>';
            html += '</div>';
            html += '</div>';
            html += '<i class="layui-icon layui-icon-delete" onclick="deleteItem('+i+')"></i>';
            html += '</div>';
        });
        html += '<div class="section-item" style="text-align: center">';
        html += '<i class="layui-icon layui-icon-add-circle add-item" onclick="addItem()"></i>';
        html += '</div>';
        $('.section-area').html(html);
        layui.form.render();
    }
    function deleteItem(index){
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        items.splice(index,1);
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
        updateAdminAccounts();
    }
    function addItem() {
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        items.push({
            login_name:'',
            first_name:'',
            last_name:''
        });
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
        updateAdminAccounts();
    }
    function onLoginNameItemInput(obj,index) {
        var value = obj.value;
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        var item = items[index];
        item.login_name = value;
        items.splice(index,1,item);
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
    }
    function onFirstNameItemInput(obj,index) {
        var value = obj.value;
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        var item = items[index];
        item.first_name = value;
        items.splice(index,1,item);
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
    }
    function onLastNameItemInput(obj,index) {
        var value = obj.value;
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        var item = items[index];
        item.last_name = value;
        items.splice(index,1,item);
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
    }
    function onCountryCodeItemInput(obj,index) {
        var value = obj.value;
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        var item = items[index];
        item.phone_country_code = value;
        items.splice(index,1,item);
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
    }
    function onAreaCodeItemInput(obj,index) {
        var value = obj.value;
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        var item = items[index];
        item.phone_area_code = value;
        items.splice(index,1,item);
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
    }
    function onPhoneNumberItemInput(obj,index) {
        var value = obj.value;
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        var item = items[index];
        item.phone_number = value;
        items.splice(index,1,item);
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
    }
    function onEmailItemInput(obj,index) {
        var value = obj.value;
        var str = $('#admin_account').val();
        var items = str.length>0?JSON.parse(str):[];
        var item = items[index];
        item.email = value;
        items.splice(index,1,item);
        var outstr = JSON.stringify(items);
        $('#admin_account').val(outstr);
    }
</script>
