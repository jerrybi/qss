{extend name="layouts/cms"}

{block name='body-content'}

<div class="layui-form-item">
    <label class="layui-form-label label-custom">Select Event</label>
    <div class="layui-input-inline">
        <form class="layui-form layui-form-pane bg-white">
            <select name="event_id" id="event" lay-verify="required" lay-filter="event">
                <option value="">Please select event</option>
            </select>
        </form>
    </div>
</div>
<div hidden="hidden" id="events"><?php echo json_encode($events);?></div>
<div class="layui-inline" style="width: 100%">
    <div class="layui-input-inline">
        <form class="form-search" action="{:url('cms/tables/index')}" method="get">
            <input type="hidden" name="curr_page" class="curr_page" value="1">
            <input type="text" value="{$search}" name="str_search" placeholder="Enter text to search"
                   class="layui-input search_input">
            <input type="hidden" name="event_id" value="{$event_id}" class="event_id">
        </form>
    </div>
    <button class="layui-btn btn-search-mz">
        Search
    </button>
    <button class="layui-btn ml10" onclick="refreshContent();"><i class="layui-icon">&#xe669;</i></button>
    <div class="layui-input-inline mr10" style="float: right">
        <button class="layui-btn layui-btn-normal" op_url="{:url('cms/tables/add')}"
                onclick="addForOpenPopups(this,'✚ Add table','95%','95%')">
            <i class="layui-icon">&#xe608;</i> Add table
        </button>
    </div>
</div>

<table class="layui-table table-body" lay-even="" lay-skin="row">
    <colgroup>
        <col width="5%">
        <col width="10%">
        <col width="10%">
        <col width="10%">
        <col width="10%">
        <col width="20%">
    </colgroup>
    <thead>
    <tr>
        <th>SN</th>
        <th>Name</th>
        <th>Total Expect Attendee</th>
        <th>Zone</th>
        <th>Event</th>
        <th>Operation</th>
    </tr>
    </thead>
    <input type="hidden" class="op_url" value="{:url('cms/tables/edit',['id'=>'opid'])}">
    <input type="hidden" class="log_url" value="{:url('cms/tables/preview',['id'=>'opid'])}">
    <input type="hidden" class="download_url" value="{:url('cms/tables/download')}">
    <input type="hidden" class="report_url" value="{:url('cms/tables/report')}">
    <tbody class="table-tbody-normal layui-form"
           ajax_page_fun="ToAjaxOpForPageDatas"
           record_num="{$record_num}" page_limit="{$page_limit}"
           page_url="{:url('cms/tables/index')}">
    {volist name="articles" id="vo"}
    <tr class="tr-normal-{$vo['id']}">
        <td>{$vo['id']}</td>
        <td class="title">{$vo['name']}</td>
        <td class="title">{$vo['capacity']}</td>
        <td class="title">{$vo['zone']}</td>
        <td class="title">{$vo['event_name']}</td>
        <td>
            <div class="layui-btn-group">
                <button class="layui-btn layui-btn-sm" title="Edit table"
                        onclick="editForOpenPopups('✎ Edit table','{$vo.id}', '95%', '95%')">
                    <i class="layui-icon">&#xe642;</i>Edit
                </button>
                <button class="layui-btn layui-btn-sm" title="Remove table"
                        onclick="delPostRecord('{$vo.id}')">
                    <i class="layui-icon">&#xe640;</i>Delete
                </button>
<!--                <button class="layui-btn layui-btn-sm" title="preview"-->
<!--                        onclick="viewLogOpenPopups('☁ preview', '{$vo.id}','95%','95%')">-->
<!--                    <i class="layui-icon">&#xe60e;</i>-->
<!--                </button>-->
<!--                <button class="layui-btn layui-btn-sm" title="report"-->
<!--                        onclick="report('{$vo.id}')">-->
<!--                    <i class="layui-icon layui-icon-table"></i>-->
<!--                </button>-->
<!--                <button class="layui-btn layui-btn-sm" title="download"-->
<!--                        onclick="download('{$vo.id}')">-->
<!--                    <i class="layui-icon layui-icon-download-circle"></i>-->
<!--                </button>-->
            </div>
        </td>
    </tr>
    {/volist}
    </tbody>
</table>
<div id="demo2-1"></div>
<style>
    .table-tbody-normal .title{
        /*color: #283560;*/
    }
    .table-tbody-normal .p-article-abstract {
        color: #eb7350;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        overflow: hidden;
    }
    .table-tbody-normal .td-article img {
        cursor: pointer;
        width: 110px;
        max-width: 111px;
    }
    .table-tbody-normal .td-article img:hover {
        transition: all 0.6s;
        transform: scale(3);
        position: relative;
        z-index: 100;
    }
</style>
<script>
    function onReady(){
        var events = JSON.parse($('#events').text());
        var event_id = "{$event_id}";
        var eventStr = "";
        $.each(events,function(i,item){
            eventStr += "<option value='"+item['id']+"'>"+item['name']+"</option>";
        });
        $("#event").html(eventStr );
        $("#event").val(event_id);
        layui.form.render('select');
    }
    layui.use('form',function(){
        var form = layui.form;
        form.on('select(event)',function(data){
            var eventId = data.value;
            $('.event_id').val(eventId);
            $(".form-search").submit();
        });
        onReady();
    });
    function report(id) {
        var op_url = $(".report_url").val();
        var eventId = $('.event_id').val();
        window.location.href = op_url+'?event_id='+eventId+'&form_id='+id;
    }
    function download(id) {
        var op_url = $(".download_url").val();
        var eventId = $('.event_id').val();
        window.location.href = op_url+'?event_id='+eventId+'&form_id='+id;
    }
    function ToAjaxOpForPageDatas(toUrl,postData) {
        $.post(
            toUrl,
            postData,
            function (result) {
                if(result.status == 200){
                    var str_html = '';
                    $.each(result.data,function (i,e) {
                        str_html +=
                            "<tr class=\"tr-normal-"+e.id+"\">\n" +
                            "                <td>"+(e.id)+"</td>\n" +
                            "                <td class=\"title\">"+e.name+"</td>\n" +
                            "                <td class=\"title\">"+e.capacity+"</td>\n" +
                            "                <td class=\"title\">"+e.zone+"</td>\n" +
                            "                <td class=\"title\">"+e.event_name+"</td>\n" +
                            "                <td>\n" +
                            "                    <div class=\"layui-btn-group\">\n" +
                            "                        <button class=\"layui-btn layui-btn-sm\" title='Edit table' \n" +
                            "                                onclick=\"editForOpenPopups('✎ Edit table','"+e.id+"','95%','95%')\">\n" +
                            "                            <i class=\"layui-icon\">&#xe642;</i>Edit\n" +
                            "                        </button>\n" +
                            "                        <button class=\"layui-btn layui-btn-sm\" title='Remove table' \n" +
                            "                                onclick=\"delPostRecord('"+e.id+"')\">\n" +
                            "                            <i class=\"layui-icon\">&#xe640;</i>Delete\n" +
                            "                        </button>\n" +
                            "                    </div>\n" +
                            "                </td>\n" +
                            "            </tr>";
                    });
                    $(".table-tbody-normal").html(str_html);
                    layui.form.render();//细节！这个好像要渲染一下！
                }else{
                    //失败
                    layer.msg(result.message);
                }
            },"JSON");
    }
</script>
