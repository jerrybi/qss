{extend name='layouts/cms'}
{block name='body-content'}
<form class="layui-form form-op-normal layui-form-pane bg-white">
    <div class="layui-form-item">
        <label class="layui-form-label label-custom">Event Name：</label>
        <div class="layui-input-inline">
            <input type="text"  required lay-verify="required"
                   value="{$eventName}"
                   disabled="disabled" autocomplete="off" class="layui-input input-title-mz">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label label-custom"><span style="color:red">*</span>Min Length：</label>
        <div class="layui-input-inline">
            <input type="number" name="min_length" 
                   value="{$article['min_length']}"
                   placeholder="Please input min length" autocomplete="off" class="layui-input input-title-mz">
        </div>
    </div>
    
    <div class="layui-form-item">
        <label class="layui-form-label label-custom"><span style="color:red">*</span>Max Length：</label>
        <div class="layui-input-inline">
            <input type="number" name="max_length" 
                   value="{$article['max_length']}"
                   placeholder="Please input max length" autocomplete="off" class="layui-input input-title-mz">
        </div>
    </div>

    <div class="layui-form-item">
        <label class="layui-form-label label-custom">Prefix：</label>
        <div class="layui-input-inline">
            <input type="text" placeholder="Please input prefix" name="prefix" required
                   lay-verify="required" class="layui-input" value="{$article['prefix']}">
        </div>
        <div class="layui-form-mid layui-word-aux">(multi prefix separated by commas)</div>
    </div>
     <div class="layui-form-item">
        <label class="layui-form-label label-custom">Suffix：</label>
        <div class="layui-input-inline">
            <input type="text" placeholder="Please input suffix" name="suffix" required
                   lay-verify="required" class="layui-input" value="{$article['suffix']}">
        </div>
        <div class="layui-form-mid layui-word-aux">(multi suffix separated by commas)</div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label label-custom">Regular：</label>
        <div class="layui-input-inline">
            <input type="text" placeholder="Please input regular" name="regular" required
                   lay-verify="required" class="layui-input" value="{$article['regular']}">
        </div>
    </div>
    <input type="hidden" name="event_id" value="{$eventId}"/>
    {:token()}
    <div class="layui-form-item">
        <div class="layui-input-block div-form-op">
            <button class="layui-btn" type="button"
                    op_url="{:url('cms/events/rule',['id'=>$eventId])}"
                    onclick="opFormPostRecord(this,fail_callback)">Submit</button>
            <button type="reset" class="layui-btn layui-btn-primary">Discard</button>
        </div>
    </div>
</form>
<script>
    function fail_callback(){
        window.location.reload();
    }
</script>
{/block}

{block name='single-content'}
{/block}
