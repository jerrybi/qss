{extend name="layouts/base" /}

{block name="content"}
<div class="content">
    <div class="container">
        <table id="table" class="layui-table table-body" lay-even="" lay-skin="row" lay-filter="table"></table>
    </div>
    <input type="hidden" id="formId" value="{$form_id}">
</div>
<style>
    .layui-table-cell{
        height: auto;
        overflow: visible;
        text-overflow:inherit;
        word-break: break-all;
        word-wrap:break-word;
        white-space: normal;
    }
    .exhibitor-header{
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
    }
    .mgr10{
        margin-right: 10px;
    }
</style>
<script>
    var myTable;
    layui.use('table',function () {
        var formId = $("#formId").val();
        myTable = layui.table.render({
            elem:'#table',
            id:'table',
            page:true,
            cols:[[
                {field:'id',title:'ID',type:'numbers'},
                {field:'salutation',title:'Salutation'},
                {field:'badge_name',title:'Badge name'},
                {field:'job_title',title:'Job title'},
                {field:'company',title:'Company'},
                {field:'country',title:'Country/Region'},
                {field:'email',title:'Email'},
            ]],
            url:"{:url('vendor/badge/index')}",
            method:'post',
            where:{form_id:formId},
            parseData:function(res){
                return {
                    "code":0,
                    "msg":'',
                    "count":res.data.record_num,
                    "data":res.data.articles
                }
            }
        });
    });
</script>
{/block}
