<script>
    var image_upload_url = "{:url('/api/uploadFile')}";
    var maxlength = 100;
    layui.use('form',function(){
        var form = layui.form;
        form.verify({
            loginname:[
                /^[a-z0-9.@]{8,256}$/,
                'invalid login name!'
            ]
        });
        form.on('submit(company)',function(data){
            opFormPostRecord(data.form,fail_callback);
        });
        initData();
    });
    function calculateWordCount() {
        var _val = $("#profile").val();
        var words = _val.split(" ");
        words = words.slice(0,maxlength);
        $("#profile").val(words.join(" "));
        $('.state').text(words.length+"/"+maxlength+" words");
    }
    function limitTextarea(self,nowleng) {
        $(self).on('input propertychange',function (event) {
            calculateWordCount();
        });
        $(self).blur(function () {
            $(self).off('input propertychange');
        });
    }
    function initData(){
        var eventId = $('#event_id').val();
        getBoothAttrs(eventId);
    };
    function fail_callback(){
        window.location.reload();
    }
    function getBoothAttrs(event_id){
        $.post(
            "{:url('/exhibitor/getCompanyAttrs')}",
            {event_id:event_id},
            function (result) {
                if(result.status == 200){
                    reloadBoothAttrs(result.data);
                }else{
                    //失败
                    dialog.tip(result.message);
                }
            },"JSON");
    }
    function getAttrByKey(attrs,key){
        for(var i=0;i<attrs.length;i++){
            var item = attrs[i];
            if(item.key == key){
                return item;
            }
        }
        return null;
    }
    function reloadBoothAttrs(data){
        if(!data) return;
        var titles = data.titles;
        var boothAttrs = data.companyAttrs;
        var booths = data.booths;
        if(titles['name']){
            $('.lbl-name').text(titles['name']);
        }
        var nameAttr = getAttrByKey(boothAttrs,'name');
        if(nameAttr){
            $('.input-name').val(nameAttr.default);
        }
        if(titles['type']){
            $('.lbl-type').text(titles['type']);
        }
        var typeAttr = getAttrByKey(boothAttrs,'type');
        if(typeAttr){
            var typeStr = "";
            var options = typeAttr.options.split('\r\n');
            $.each(options,function(i,item){
                if(item != 'Main'){
                    typeStr += "<option value='"+item+"'>"+item+"</option>";
                }
            });
            $("#type").html(typeStr);
            $("#type").val(typeAttr.default);
            layui.form.render();
        }
        //booth
        if(titles['booth']){
            $('.lbl-booth').text(titles['booth']);
        }
        //location
        if(titles['location']){
            $('.lbl-location').text(titles['location']);
        }
        if(titles['badge']){
            $('.lbl-badge').text(titles['badge']);
        }
        //origin_country
        if(titles['origin_country']){
            $('.lbl-origin-country').text(titles['origin_country']);
        }
        var originCountryAttr = getAttrByKey(boothAttrs,'origin_country');
        if(originCountryAttr){
            var originCountryStr = "";
            var options = originCountryAttr.options.split('\r\n');
            $.each(options,function(i,item){
                originCountryStr += "<option value='"+item+"'>"+item+"</option>";
            });
            $("#origin_country").html(originCountryStr);
            $("#origin_country").val(originCountryAttr.default);
            layui.form.render();
        }
        //profile
        if(titles['profile']){
            // $('.lbl-profile').text(titles['profile']);
            $('.lbl-profile').html(titles['profile']+"<br><span style='font-style: italic;font-size: 12px'>MAX 100 Words</span>");
        }
        var profileAttr = getAttrByKey(boothAttrs,'profile');
        if(profileAttr){
            $('.input-profile').val(profileAttr.default);
        }
        //logo
        if(titles['logo']){
            $('.lbl-logo').text(titles['logo']);
        }
        //email
        if(titles['email']){
            $('.lbl-email').text(titles['email']);
        }
        var emailAttr = getAttrByKey(boothAttrs,'email');
        if(emailAttr){
            $('.input-email').val(emailAttr.default);
        }
        //address line 1
        if(titles['address_line1']){
            $('.lbl-address-line1').text(titles['address_line1']);
        }
        var addressLine1Attr = getAttrByKey(boothAttrs,'address_line1');
        if(addressLine1Attr){
            $('.input-address-line1').val(addressLine1Attr.default);
        }
        //address line 2
        if(titles['address_line2']){
            $('.lbl-address-line2').text(titles['address_line2']);
        }
        var addressLine2Attr = getAttrByKey(boothAttrs,'address_line2');
        if(addressLine2Attr){
            $('.input-address-line2').val(addressLine2Attr.default);
        }
        //postal
        if(titles['postal']){
            $('.lbl-postal').text(titles['postal']);
        }
        var postalAttr = getAttrByKey(boothAttrs,'postal');
        if(postalAttr){
            $('.input-postal').val(postalAttr.default);
        }
        //country
        if(titles['country']){
            $('.lbl-country').text(titles['country']);
        }
        var countryAttr = getAttrByKey(boothAttrs,'country');
        if(countryAttr){
            var countryStr = "";
            var options = countryAttr.options.split('\r\n');
            $.each(options,function(i,item){
                countryStr += "<option value='"+item+"'>"+item+"</option>";
            });
            $("#country").html(countryStr);
            $("#country").val(countryAttr.default);
            layui.form.render();
        }
        //phone
        if(titles['phone']){
            $('.lbl-phone').text(titles['phone']);
        }
        //fax
        if(titles['fax']){
            $('.lbl-fax').text(titles['fax']);
        }
        //website
        if(titles['website']){
            $('.lbl-website').text(titles['website']);
        }
        var websiteAttr = getAttrByKey(boothAttrs,'website');
        if(websiteAttr){
            $('.input-website').val(websiteAttr.default);
        }
        //industry
        if(titles['industry']){
            $('.lbl-industry').text(titles['industry']);
        }
        //product
        if(titles['product']){
            $('.lbl-product').text(titles['product']);
        }
        //billing address line 1
        // if(titles['billing_address_line1']){
        //     $('.lbl-billing-address-line1').text(titles['billing_address_line1']);
        // }
        // var billingAddressLine1Attr = getAttrByKey(boothAttrs,'billing_address_line1');
        // if(billingAddressLine1Attr){
        //     $('.input-billing-address-line1').val(billingAddressLine1Attr.default);
        // }
        //billing address line 2
        // if(titles['billing_address_line2']){
        //     $('.lbl-billing-address-line2').text(titles['billing_address_line2']);
        // }
        // var billingAddressLine2Attr = getAttrByKey(boothAttrs,'billing_address_line2');
        // if(billingAddressLine2Attr){
        //     $('.input-billing-address-line2').val(billingAddressLine2Attr.default);
        // }
        //billing postal
        // if(titles['billing_postal']){
        //     $('.lbl-billing-postal').text(titles['billing_postal']);
        // }
        // var billingPostalAttr = getAttrByKey(boothAttrs,'billing_postal');
        // if(billingPostalAttr){
        //     $('.input-billing-postal').val(billingPostalAttr.default);
        // }
        //billing country
        // if(titles['billing_country']){
        //     $('.lbl-billing-country').text(titles['billing_country']);
        // }
        // var billingCountryAttr = getAttrByKey(boothAttrs,'billing_country');
        // if(billingCountryAttr){
        //     var countryStr = "";
        //     var options = billingCountryAttr.options.split('\r\n');
        //     $.each(options,function(i,item){
        //         countryStr += "<option value='"+item+"'>"+item+"</option>";
        //     });
        //     $("#billing_country").html(countryStr);
        //     $("#billing_country").val(billingCountryAttr.default);
        //     layui.form.render();
        // }
        layui.form.render();
        calculateWordCount();
    }
</script>
