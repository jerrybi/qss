<html>
<head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        @font-face {
            font-family: 'DIN';
            font-style: normal;
            font-weight: 700;
            src: url(../fonts/DIN-Bold.ttf) format('truetype');
        }
        @font-face {
            font-family: 'DIN';
            font-style: normal;
            font-weight: 400;
            src: url(../fonts/DIN-Regular.ttf) format('truetype');
        }
        @media screen and (max-width:768px) {
            .content{
                flex-direction: column!important;
                height: auto!important;
            }
            .container-bg{
                background-image: url(../images/bg_portrait_center.png)!important;
                background-size: 100% 100%!important;
            }
            .container{
                padding-left: 0!important;
                width: 70%!important;
            }
            .container-top{
                display: block!important;
            }
            .container-bottom{
                display: block!important;
            }
            .title,.footer{
                text-align: center!important;
            }
            .footer{
                font-size: 14px!important;
            }
        }
        .container-bg{
            background-image: url(../images/bg_land2.png);
            background-repeat: no-repeat;
            background-size: contain;
            background-position:center center;
            background-color:#00306b;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center
        }
        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 0 0 45%;
            width: 500px;
            margin-top: -5%;
        }
        .title{
            color: #dba958;
            text-align: center;
            width: 100%;
            font-size: 16px;
            line-height: 20px;
            margin-bottom: 20px;
        }
        .footer{
            text-align: left;
            color: #dba958;
            font-size: 16px;
            width: 100%;
            line-height: 20px;
        }
        .content{
            background-color: #00306b;
            font-family: 'DIN', Verdana, Sans-Serif;
            width: 100%;
            height:100%;
            text-align: left;
            font-size: 16px;
            margin: auto;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center
        }
        .container-top{
            display: none;
        }
        .container-bottom{
            display: none;
        }
    </style>
</head>
<body style="background-color: #00306b">
    <div class="content">
        <div class="container-top">
            <img src="../images/bg_portrait_top.png" width="100%"/>
        </div>
        <div class="container-bg">
            <div class="container">
                <div class="title">Please scan QR code to download your digital card.</div>
                <img src="{$url}" width="150" height="150"/>
            </div>
        </div>
        <div class="container-bottom">
            <img src="../images/bg_portrait_bottom.png" width="100%"/>
        </div>
    </div>
    <script type="text/javascript">
        function clickUser(id) {
            window.location.href = '/index/user?id='+id;
        }
    </script>
</body>
</html>
