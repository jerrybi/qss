<body style="background-color: #00306b">
    <div class="content">
        <div class="container-top">
            <img src="../images/bg_portrait_top.png" width="100%"/>
        </div>
        <div class="container-bg">
            <div class="container">
                <input type="text"  name="name"
                       value=""
                       placeholder="Please input your name" autocomplete="off" class="layui-input input-title-mz" lay-verify="required">
                <div class="layui-form-item my-btn">
                    <button class="layui-btn" id="btnSubmit" type="button" lay-submit lay-filter="detail">Search</button>
                </div>
            </div>
        </div>
        <div class="container-bottom">
            <img src="../images/bg_portrait_bottom.png" width="100%"/>
        </div>
    </div>
<script>
    layui.use(['form','element'],function () {
        var form = layui.form;
        var element = layui.element;
        form.on("submit(detail)",function () {
            submit();
        });
        form.verify({
            radiorequired:function(value,item){
                var $ = layui.$;
                var verifyName=$(item).attr('name')
                    , verifyType=$(item).attr('type')
                    ,formElem=$(item).parents('.layui-form')//获取当前所在的form元素，如果存在的话
                    ,verifyElem=formElem.find('input[name='+verifyName+']')//获取需要校验的元素
                    ,isTrue= verifyElem.is(':checked')//是否命中校验
                    ,focusElem = verifyElem.next().find('i.layui-icon');//焦点元素
                if(!isTrue || !value) {
                    //定位焦点
                    focusElem.css(verifyType == 'radio' ? {"color": "#FF5722"} : {"border-color": "#FF5722"});
                    //对非输入框设置焦点
                    focusElem.first().attr("tabIndex", "1").css("outline", "0").blur(function () {
                        focusElem.css(verifyType == 'radio' ? {"color": ""} : {"border-color": ""});
                    }).focus();
                    return 'The required item must be selected!';
                }
            },
            checkboxrequired:function(value,item){
                var $ = layui.$;
                var verifyName=$(item).attr('name')
                    , verifyType=$(item).attr('type')
                    ,formElem=$(item).parents('.layui-form')//获取当前所在的form元素，如果存在的话
                    ,verifyElem=formElem.find('input[name="'+verifyName+'"]')//获取需要校验的元素
                    ,isTrue= verifyElem.is(':checked')//是否命中校验
                    ,focusElem = verifyElem.next().find('i.layui-icon');//焦点元素
                if(!isTrue || !value) {
                    //定位焦点
                    focusElem.css(verifyType == 'checkbox' ? {"color": "#FF5722"} : {"border-color": "#FF5722"});
                    //对非输入框设置焦点
                    focusElem.first().attr("tabIndex", "1").css("outline", "0").blur(function () {
                        focusElem.css(verifyType == 'checkbox' ? {"color": ""} : {"border-color": ""});
                    }).focus();
                    return 'The required item must be selected!';
                }
            }
        });
    });

    function submit(){
        var name = $("input[name='name']").val();
        window.location.href = '/index/result?name='+name;
    }
</script>
</body>
</html>
