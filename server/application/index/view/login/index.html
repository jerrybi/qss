<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QSS</title>
    <!-- load layui -->
    {include file='layouts/layui'}
    <!-- 加载公共文件  -->
    <link href="__INDEX__/css/zhang.css" rel="stylesheet">
    <script type='text/javascript' src="__INDEX__/js/crypto-js.js"></script>
    <script type='text/javascript' src="__INDEX__/js/aes.js"></script>
</head>
<body id="body-login">

<div class="video_mask"></div>
<div class="div-login">
    <div class="login-header">
        <img class="img-logo"
             src="/cms/images/logo.jpg">
        <div class="text-logo">
            QSS For Exhibitor
        </div>
    </div>
    <form class="layui-form layui-form-pane" id="form-login">
        <div class="layui-form-item">
            <label class="layui-form-label">
<!--                <img class="img-user_name"
                     src="/cms/images/icon/user_name.png">-->
                <i class='fa fa-user'></i>
            </label>
            <div class="layui-input-inline">

                <input type="text" name="user_name" required id="username"
                       lay-verify="required" placeholder="Please input username"
                       autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">
<!--                <img class="img-user_pwd"
                     src="/cms/images/icon/user_pwd.png">-->
                <i class="fa fa-lock"></i>
            </label>
            <div class="layui-input-inline">
                <input type="password" name="password" required id="pwd"
                       lay-verify="required" placeholder="Please input password"
                       autocomplete="off" class="layui-input">
            </div>
        </div>
<!--        <div class="layui-form-item">
            <input type="text" name="login_verifyCode" required id="vfy"
                   class="layui-input input-verifyCode" placeholder="">
            <span class="span-img-verifyCode">{:captcha_img()}</span>
        </div>-->
        <div class="layui-form-item">
            <div class="layui-input-block div-form-op">
                <button class="layui-btn btn-login button-bg-color" type="button" onclick="adminLogin()"
                        lay-submit lay-filter="formDemo">Login
                </button>
                <button type="reset" class="layui-btn layui-btn-primary">Reset</button>
            </div>
        </div>
    </form>
</div>
<style>
    .img-user_name,.img-user_pwd{
        width: 25px;
    }
    .input-verifyCode {
        font-weight: 700;
        font-family: "Droid Sans";
        width: 40%;
        height: 50.2px;
    }
    .span-img-verifyCode {
        position: relative;
        top: -50.2px;
        left: 110px;
        width: 71%;
        float: left;
    }

    .span-img-verifyCode img {
        width: 80%;
    }
    .login_bg{
        background-color: transparent;
        display: block;
        position: absolute;
        z-index: 1;
        top: 0;
        width: 100%;
        height: 100%;
    }
    .login-header{
        width: 450px;
        height:60px;
        background: white;
    }
    .img-logo{
        width: 50px;
        height:50px;
    }
    .text-logo{
        display: inline-block;
        width:350px;
        color:#283560;
        text-align: center;
        font-size: 25px;
    }
    #form-login{
        padding-top: 35px;
    }
</style>
</body>
<script>
    window.onload = function () {
        //要初始化的东西 TODO 我就奇怪为啥有的代码在$(document).function()中就不行！！！
        $(window).resize(function () {
            if ($(".video-player").width() > $(window).width()) {
                $(".video-player").css({
                    "height": $(window).height(),
                    "width": "auto",
                    "left": -($(".video-player").width() - $(window).width()) / 2
                });
            } else {
                $(".video-player").css({
                    "width": $(window).width(),
                    "height": "auto",
                    "left": -($(".video-player").width() - $(window).width()) / 2
                });
            }
        }).resize();
    };
    $(document).on('keydown', function () {
        if (event.keyCode == 13) {
            $(".btn-login").click();
        }
    });

    /**
     * 后台登录触发事件
     */
    function adminLogin() {
        var toUrl = "{:url('index/login/ajaxLogin')}";
        var postData = $("#form-login").serialize();
        var indexUrl = "{:url('index/index/index')}";
        var username = $('#username').val();
        var pwd = $('#pwd').val();
        var vfy = $('#vfy').val();
        var md5Pwd = CryptoJS.MD5(pwd).toString();
        var publicKey = aesEncrypt(username,md5Pwd,'qsxxqsxxqsxxqsxx');
        //测试模式下删除google recaptcha
//        grecaptcha.ready(function(){
//            grecaptcha.execute('6Lcl1r0ZAAAAANH10p5UAevSl3XmCy1mdoprviCt',{action:'submit'}).then(function(token){
                $.post(
                    toUrl,
                    {
                        user_name:username,
                        public_key:publicKey,
                        login_verifyCode:vfy,
//                        g_recaptcha_response:token
                    },
                    function (result) {
                        if (result.status != 0) {
                            window.location.href = indexUrl;
                        } else {
                            //失败
                            layer.msg(result.message);
                        }
                    }, "JSON");
//            });
//        });

    }
</script>
</html>
